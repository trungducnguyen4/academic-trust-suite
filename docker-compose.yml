services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "mysql://examtrust:CHANGE_ME@db:3306/examtrust"
      JWT_SECRET: "CHANGE_ME"
      JWT_EXPIRES_IN: "15m"
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: "CHANGE_ME"
      SMTP_PASS: "CHANGE_ME"
      EMAIL_FROM: "ExamTrust <no-reply@example.com>"
      AI_PROVIDER: "ollama"
      AI_OLLAMA_URL: "http://ollama:11434"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: examtrust
      MYSQL_USER: examtrust
      MYSQL_PASSWORD: CHANGE_ME
      MYSQL_ROOT_PASSWORD: CHANGE_ME
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  db_data:
