x-ai-env: &ai-env
  AI_PROVIDER: "ollama"
  AI_OLLAMA_URL: "http://ollama:11434"
  AI_OLLAMA_MODEL: "gemma3:4b"
  AI_OLLAMA_TEMPERATURE: "0.2"
  AI_OLLAMA_TOP_P: "0.85"
  AI_OLLAMA_REPEAT_PENALTY: "1.1"
  AI_OLLAMA_NUM_CTX: "8192"
  NVIDIA_API_KEY: "${NVIDIA_API_KEY:-}"
  AI_NVIDIA_BASE_URL: "https://integrate.api.nvidia.com/v1"
  AI_NVIDIA_MODEL: "z-ai/glm-5.2"
  AI_APP_NAME: "ExamTrust"
  AI_DEFAULT_LANGUAGE: "vi"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "mysql://examtrust:CHANGE_ME@db:3306/examtrust"
      JWT_SECRET: "CHANGE_ME"
      JWT_EXPIRES_IN: "15m"
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: "CHANGE_ME"
      SMTP_PASS: "CHANGE_ME"
      EMAIL_FROM: "ExamTrust <no-reply@example.com>"
      <<: *ai-env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  ai-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["node", "dist/ai-worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: "mysql://examtrust:CHANGE_ME@db:3306/examtrust"
      JWT_SECRET: "CHANGE_ME"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      <<: *ai-env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: examtrust
      MYSQL_USER: examtrust
      MYSQL_PASSWORD: CHANGE_ME
      MYSQL_ROOT_PASSWORD: CHANGE_ME
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  db_data:
  ollama_data:
